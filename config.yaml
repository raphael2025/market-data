symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT

# 币安支持的全部 K 线周期
kline_intervals:
  - 1m
  - 3m
  - 5m
  - 15m
  - 30m
  - 1h
  - 2h
  - 4h
  - 6h
  - 8h
  - 12h
  - 1d
  - 3d
  - 1w
  - 1M

# 多空比 / 持仓量历史 / 基差 的全部采样周期
data_periods:
  - 5m
  - 15m
  - 30m
  - 1h
  - 2h
  - 4h
  - 6h
  - 12h
  - 1d

binance:
  rest_base: https://fapi.binance.com
  ws_base: wss://fstream.binance.com

storage:
  db_path: data/market.db

api:
  host: 0.0.0.0
  port: 8765

# L2 优先：独立 WS 连接 + 序号校验 + 断连/跳号 REST 快照桥接
l2:
  snapshot_interval: 10
  snapshot_limit: 1000

# P0/P1 实时保障：WS 看门狗 + agg REST 补缺
realtime:
  ws_stale_agg_s: 45       # trade 连接：全 symbol agg 停更则重连
  ws_stale_book_s: 45
  ws_stale_mark_s: 30
  ws_stale_kline_s: 120
  watchdog_interval_s: 15
  agg_gap_fill: true       # 库内 agg 滞后 >15s 时 REST 按 1h 窗补缺

# REST 定时采集 — P0/P1 优先，P2 降频，长期历史最低
schedules:
  open_interest: 60
  open_interest_hist: 600      # P2：30 天窗口，错峰
  funding_rate: 3600
  funding_info: 3600
  long_short_ratio: 630        # 与 hist/basis 错开 30s
  ticker_24h: 60
  ticker_price: 60
  basis: 660                   # 与 hist/多空比 错开
  book_ticker: 15              # P0：无历史 book tick REST 兜底
  depth_snapshot: 10
  mark_prices_rest: 30         # P0：mark tick REST 兜底
  insurance_balance: 3600
  delivery_price: 3600
  exchange_info: 86400
  trades_poll: 120             # P1：仅 1000 笔快照，降频
  agg_trades_poll: 60          # P1：极短 REST 窗口轮询
  agg_gap_fill: 60             # P1：缺口自动回补

# REST 权重限流（币安全 IP 上限 2400/min）
rate_limit:
  max_weight_per_minute: 1800
  backfill_max_weight_per_minute: 200
  futures_data_max_per_5min: 900   # 币安 /futures/data/* 1000/5min，留 10% 余量
  backfill_agg_trades_sleep: 1.0
  backfill_historical_sleep: 12.0
  backfill_recent_sleep: 2.0
  batches_per_round: 1

# 长历史回填最低优先
backfill:
  startup_delay_s: 600         # 启动后 10 分钟再跑 K 线回填
  defer_30d_full: true         # 30 天统计不由回填线程抢权重

backfill_days: 0
