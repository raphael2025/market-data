symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT

# 币安支持的全部 K 线周期
kline_intervals:
  - 1m
  - 3m
  - 5m
  - 15m
  - 30m
  - 1h
  - 2h
  - 4h
  - 6h
  - 8h
  - 12h
  - 1d
  - 3d
  - 1w
  - 1M

# 多空比 / 持仓量历史 / 基差 的全部采样周期
data_periods:
  - 5m
  - 15m
  - 30m
  - 1h
  - 2h
  - 4h
  - 6h
  - 12h
  - 1d

binance:
  rest_base: https://fapi.binance.com
  ws_base: wss://fstream.binance.com

storage:
  db_path: data/market.db

api:
  host: 0.0.0.0
  port: 8765

# REST 定时采集间隔（秒）— 持续写入，永久保留
schedules:
  open_interest: 30
  open_interest_hist: 300
  funding_rate: 1800
  funding_info: 3600
  long_short_ratio: 300
  ticker_24h: 30
  ticker_price: 30
  basis: 300
  book_ticker: 5
  depth_snapshot: 15
  mark_prices_rest: 15
  insurance_balance: 3600
  delivery_price: 3600
  exchange_info: 86400
  trades_poll: 10
  agg_trades_poll: 60

# REST 权重限流（币安全 IP 上限 2400/min）
# 实时 REST 兜底 + WS 优先；历史回填走独立低速通道
rate_limit:
  max_weight_per_minute: 1800      # 实时任务可用总权重
  backfill_max_weight_per_minute: 350  # 历史回填独立上限（24h 以外低速）
  backfill_agg_trades_sleep: 1.0     # 24h 内 aggTrades 回填间隔
  backfill_historical_sleep: 8.0     # 24h 以外 K 线每批后暂停（秒）
  backfill_recent_sleep: 2.0         # 24h 内回填任务间隔
  batches_per_round: 3               # 每轮回填最多批次数，然后让路实时

# 历史回填：0 = 尽可能久远（从合约上线日起）
backfill_days: 0
